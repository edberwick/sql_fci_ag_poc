# SQL Server 2025 Enterprise Edition Configuration File
# This file contains all installation parameters for unattended setup

[OPTIONS]

# Installation
ACTION="Install"
IACCEPTSQLSERVERLICENSETERMS="True"
QUIET="True"
SUPPRESSPRIVACYSTATEMENTNOTICE="True"
SUPPRESSPAIDEDITIONNOTICE="True"
ENU="True"

# Instance Configuration
INSTANCENAME="MSSQLSERVER"
INSTANCEID="MSSQLSERVER"
INSTANCEDIR="C:\Program Files\Microsoft SQL Server"

# Features to Install
FEATURES="SQLEngine"

# Service Accounts
SQLSVCACCOUNT="NT AUTHORITY\SYSTEM"
SQLSVCSTARTUPTYPE="Automatic"
AGTSVCACCOUNT="NT AUTHORITY\SYSTEM"
AGTSVCSTARTUPTYPE="Automatic"
BROWSERSVCSTARTUPTYPE="Automatic"

# Authentication Mode
SECURITYMODE="SQL"
SAPWD="P@ssw0rd123!"

# System Administrators
SQLSYSADMINACCOUNTS="BUILTIN\Administrators"

# Database Engine Configuration
SQLCOLLATION="SQL_Latin1_General_CP1_CI_AS"
SQLBACKUPDIR="C:\Program Files\Microsoft SQL Server\MSSQL17.MSSQLSERVER\MSSQL\Backup"
SQLTEMPDBDIR="C:\Program Files\Microsoft SQL Server\MSSQL17.MSSQLSERVER\MSSQL\Data"
SQLTEMPDBLOGDIR="C:\Program Files\Microsoft SQL Server\MSSQL17.MSSQLSERVER\MSSQL\Data"
SQLUSERDBDIR="C:\Program Files\Microsoft SQL Server\MSSQL17.MSSQLSERVER\MSSQL\Data"
SQLUSERDBLOGDIR="C:\Program Files\Microsoft SQL Server\MSSQL17.MSSQLSERVER\MSSQL\Data"

# Network Configuration
TCPENABLED="1"
NPENABLED="0"
BROWSERSVCSTARTUPTYPE="Automatic"

# Error and Usage Reporting
ERRORREPORTING="False"
SQMREPORTING="False"
ENABLEMICROSOFTUPDATE="False"

# Installation Paths
INSTALLSHAREDDIR="C:\Program Files\Microsoft SQL Server"
INSTALLSHAREDWOWDIR="C:\Program Files (x86)\Microsoft SQL Server"
INSTANCEMSDIR="C:\Program Files\Microsoft SQL Server"

# Performance Settings
SQLMAXMEMORY="2147483647"
SQLMINMEMORY="0"

# Maintenance
FILESTREAMLEVEL="0"
X86="False"

# Update Source
UPDATEENABLED="False"
USEMICROSOFTUPDATE="False"
UPDATESOURCE="MU"